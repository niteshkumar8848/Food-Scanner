name: food_scanner
description: "AI-powered food scanner with health scoring."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  permission_handler: ^12.0.1
  tflite_flutter: ^0.11.0
  image: ^4.2.0
  http: ^1.2.2
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/food_classifier.tflite
    - assets/models/labels.txt
    - assets/data/food_database.json
    - assets/test_foods/
